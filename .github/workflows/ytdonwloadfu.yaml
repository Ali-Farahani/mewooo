name: youtube-download

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Video URLs, one URL per line"
        required: true
        type: string
      cookies_b64_list:
        description: "Base64 cookies. Either one line for all URLs, or one line per URL"
        required: true
        type: string
      folder_name:
        description: "Output folder name inside downloads/"
        required: true
        default: "youtube"
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3 python3-pip coreutils
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade yt-dlp
      - name: Prepare inputs
        shell: bash
        run: |
          set -u

          FOLDER_NAME="${{ github.event.inputs.folder_name }}"

          mkdir -p "downloads/$FOLDER_NAME"
          mkdir -p "tmp_cookies"
          mkdir -p "logs"

          cat > urls_raw.txt <<'EOF_URLS'
          ${{ github.event.inputs.urls }}
          EOF_URLS

          cat > cookies_b64_raw.txt <<'EOF_COOKIES'
          ${{ github.event.inputs.cookies_b64_list }}
          EOF_COOKIES

          # پاک‌سازی URLها:
          # هم URLهای خط‌به‌خط را قبول می‌کند،
          # هم URLهایی که با فاصله پشت سر هم paste شده‌اند.
          tr -s '[:space:]' '\n' < urls_raw.txt \
            | sed 's/\r$//' \
            | sed '/^[[:space:]]*$/d' \
            > urls.txt

          # پاک‌سازی کوکی‌ها:
          # کوکی Base64 باید یک خط کامل باشد.
          sed 's/\r$//' cookies_b64_raw.txt \
            | sed '/^[[:space:]]*$/d' \
            > cookies_b64_list.txt

          URL_COUNT=$(grep -cve '^[[:space:]]*$' urls.txt || true)
          COOKIE_COUNT=$(grep -cve '^[[:space:]]*$' cookies_b64_list.txt || true)

          echo "URL_COUNT=$URL_COUNT"
          echo "COOKIE_COUNT=$COOKIE_COUNT"

          echo "Detected URLs:"
          cat urls.txt

          if [ "$URL_COUNT" -eq 0 ]; then
            echo "ERROR: urls input is empty."
            exit 1
          fi

          if [ "$COOKIE_COUNT" -eq 0 ]; then
            echo "ERROR: cookies_b64_list input is empty."
            exit 1
          fi

          # اگر فقط یک کوکی داده شده باشد، برای همه URLها استفاده می‌شود.
          # اگر بیشتر از یک کوکی داده شده باشد، باید تعداد کوکی‌ها با تعداد URLها برابر باشد.
          if [ "$COOKIE_COUNT" -ne 1 ] && [ "$COOKIE_COUNT" -ne "$URL_COUNT" ]; then
            echo "ERROR: cookies_b64_list must contain either:"
            echo "  - exactly 1 cookie line to use for all URLs"
            echo "  - or the same number of cookie lines as URLs"
            echo ""
            echo "URLs: $URL_COUNT"
            echo "Cookies: $COOKIE_COUNT"
            exit 1
          fi

          echo "Prepared successfully."


      - name: Download videos
        shell: bash
        run: |
          set -u

          FOLDER_NAME="${{ github.event.inputs.folder_name }}"

          REPORT_FILE="downloads/$FOLDER_NAME/DOWNLOAD_REPORT.txt"
          FAILED_FILE="downloads/$FOLDER_NAME/FAILED_URLS.txt"
          SUCCESS_FILE="downloads/$FOLDER_NAME/SUCCESS_URLS.txt"

          : > "$REPORT_FILE"
          : > "$FAILED_FILE"
          : > "$SUCCESS_FILE"

          URL_COUNT=$(grep -cve '^[[:space:]]*$' urls.txt || true)
          COOKIE_COUNT=$(grep -cve '^[[:space:]]*$' cookies_b64_list.txt || true)

          echo "Download started at: $(date -u)" >> "$REPORT_FILE"
          echo "URL_COUNT=$URL_COUNT" >> "$REPORT_FILE"
          echo "COOKIE_COUNT=$COOKIE_COUNT" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"

          if [ "$COOKIE_COUNT" -eq 1 ]; then
            USE_SINGLE_COOKIE=1
            SINGLE_COOKIE_B64="$(head -n 1 cookies_b64_list.txt)"
            echo "Mode: single cookie for all URLs" >> "$REPORT_FILE"
          else
            USE_SINGLE_COOKIE=0
            echo "Mode: one cookie per URL" >> "$REPORT_FILE"
          fi

          echo "" >> "$REPORT_FILE"

          i=0

          while IFS= read -r VIDEO_URL
          do
            [ -z "$VIDEO_URL" ] && continue

            i=$((i + 1))

            echo "========================================"
            echo "Processing item #$i"
            echo "$VIDEO_URL"

            LOG_FILE="downloads/$FOLDER_NAME/item-$i.log"
            COOKIE_FILE="tmp_cookies/cookies-$i.txt"

            echo "========================================" >> "$REPORT_FILE"
            echo "Item #$i" >> "$REPORT_FILE"
            echo "URL: $VIDEO_URL" >> "$REPORT_FILE"
            echo "Log: item-$i.log" >> "$REPORT_FILE"

            if [ "$USE_SINGLE_COOKIE" -eq 1 ]; then
              COOKIES_B64="$SINGLE_COOKIE_B64"
            else
              COOKIES_B64="$(sed -n "${i}p" cookies_b64_list.txt)"
            fi

            if [ -z "$COOKIES_B64" ]; then
              echo "FAILED: Empty cookie base64 for item #$i" | tee -a "$LOG_FILE"
              echo "$VIDEO_URL" >> "$FAILED_FILE"
              echo "Status: FAILED - empty cookie base64" >> "$REPORT_FILE"
              echo "" >> "$REPORT_FILE"
              continue
            fi

            rm -f "$COOKIE_FILE"

            # Decode cookie
            if ! printf '%s' "$COOKIES_B64" | base64 -d > "$COOKIE_FILE" 2>> "$LOG_FILE"; then
              echo "FAILED: Base64 decode failed for item #$i" | tee -a "$LOG_FILE"
              echo "$VIDEO_URL" >> "$FAILED_FILE"
              echo "Status: FAILED - base64 decode failed" >> "$REPORT_FILE"
              echo "" >> "$REPORT_FILE"
              rm -f "$COOKIE_FILE"
              continue
            fi

            # Validate cookie file
            if [ ! -s "$COOKIE_FILE" ]; then
              echo "FAILED: Cookie file is empty for item #$i" | tee -a "$LOG_FILE"
              echo "$VIDEO_URL" >> "$FAILED_FILE"
              echo "Status: FAILED - empty cookie file" >> "$REPORT_FILE"
              echo "" >> "$REPORT_FILE"
              rm -f "$COOKIE_FILE"
              continue
            fi

            if ! grep -q "Netscape HTTP Cookie File" "$COOKIE_FILE"; then
              echo "WARNING: Cookie file does not contain Netscape header." | tee -a "$LOG_FILE"
              echo "Continuing anyway..." | tee -a "$LOG_FILE"
            fi

            echo "Starting yt-dlp for item #$i" | tee -a "$LOG_FILE"

            # دانلود ویدیو
            # هر ویدیو جداگانه ذخیره می‌شود و اسم فایل را yt-dlp بر اساس title و id می‌سازد.
            if yt-dlp \
              --cookies "$COOKIE_FILE" \
              --no-playlist \
              --merge-output-format mp4 \
              -f "bv*+ba/best" \
              -o "downloads/$FOLDER_NAME/%(title).200s [%(id)s].%(ext)s" \
              "$VIDEO_URL" >> "$LOG_FILE" 2>&1
            then
              echo "SUCCESS: $VIDEO_URL" | tee -a "$LOG_FILE"
              echo "$VIDEO_URL" >> "$SUCCESS_FILE"
              echo "Status: SUCCESS" >> "$REPORT_FILE"
            else
              echo "FAILED: yt-dlp failed for item #$i" | tee -a "$LOG_FILE"
              echo "$VIDEO_URL" >> "$FAILED_FILE"
              echo "Status: FAILED - yt-dlp error" >> "$REPORT_FILE"
            fi

            echo "" >> "$REPORT_FILE"

            rm -f "$COOKIE_FILE"

          done < urls.txt

          echo "========================================" >> "$REPORT_FILE"
          echo "Download finished at: $(date -u)" >> "$REPORT_FILE"
          echo "Successful:" >> "$REPORT_FILE"
          wc -l "$SUCCESS_FILE" >> "$REPORT_FILE" || true
          echo "Failed:" >> "$REPORT_FILE"
          wc -l "$FAILED_FILE" >> "$REPORT_FILE" || true

          rm -rf tmp_cookies
          rm -f urls_raw.txt cookies_b64_raw.txt urls.txt cookies_b64_list.txt

      - name: Split large files
        shell: bash
        run: |
          set -u

          FOLDER_NAME="${{ github.event.inputs.folder_name }}"

          cd "downloads/$FOLDER_NAME"

          # فایل‌های گزارشی و لاگ‌ها split نشوند
          find . -type f \
            ! -name "*.part_*" \
            ! -name "DOWNLOAD_REPORT.txt" \
            ! -name "FAILED_URLS.txt" \
            ! -name "SUCCESS_URLS.txt" \
            ! -name "item-*.log" \
            -size +90M | while IFS= read -r FILE
          do
            echo "Splitting large file: $FILE"

            split -b 90M "$FILE" "$FILE.part_"

            rm -f "$FILE"

            echo "Split completed: $FILE"
          done

      - name: Commit and push results
        shell: bash
        run: |
          set -u

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add downloads/

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Add downloaded videos"
          git push
