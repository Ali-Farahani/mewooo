name: youtube-download

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "One YouTube URL per line"
        required: true
        type: string

      cookies_b64_list:
        description: "One Base64 cookies.txt per line, matching URLs line-by-line"
        required: true
        type: string

      folder_name:
        description: "Folder name inside downloads/"
        required: true
        default: "video"
        type: string

      quality:
        description: "yt-dlp format selector"
        required: false
        default: "bv*+ba/b"
        type: string

      split_size_mb:
        description: "Maximum size per file in MB"
        required: false
        default: "90"
        type: string

jobs:
  download:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark repo safe
        run: |
          set -eu
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install tools
        run: |
          set -eu

          sudo apt-get update
          sudo apt-get install -y ffmpeg curl ca-certificates coreutils git

          sudo curl -L \
            https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
            -o /usr/local/bin/yt-dlp

          sudo chmod +x /usr/local/bin/yt-dlp

          echo "yt-dlp:"
          yt-dlp --version

          echo "node:"
          node --version

          echo "ffmpeg:"
          ffmpeg -version | head -n 1

      - name: Prepare workspace
        env:
          FOLDER_NAME: ${{ github.event.inputs.folder_name }}
          URLS_RAW: ${{ github.event.inputs.urls }}
          COOKIES_RAW: ${{ github.event.inputs.cookies_b64_list }}
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE"

          if [ -z "${FOLDER_NAME:-}" ]; then
            echo "ERROR: folder_name is required."
            exit 1
          fi

          mkdir -p "downloads/$FOLDER_NAME"
          mkdir -p "tmp_cookies"

          rm -f cookies.txt
          find "tmp_cookies" -type f -delete || true
          find "downloads/$FOLDER_NAME" -mindepth 1 -maxdepth 1 -type f -delete || true

          printf '%s\n' "$URLS_RAW" > urls.txt
          printf '%s\n' "$COOKIES_RAW" > cookies_b64_list.txt

          URL_COUNT=$(grep -cve '^[[:space:]]*$' urls.txt || true)
          COOKIE_COUNT=$(grep -cve '^[[:space:]]*$' cookies_b64_list.txt || true)

          echo "URLs count: $URL_COUNT"
          echo "Cookies count: $COOKIE_COUNT"

          if [ "$URL_COUNT" -eq 0 ]; then
            echo "ERROR: urls input is empty."
            exit 1
          fi

          if [ "$COOKIE_COUNT" -eq 0 ]; then
            echo "ERROR: cookies_b64_list input is empty."
            exit 1
          fi

          if [ "$URL_COUNT" -ne "$COOKIE_COUNT" ]; then
            echo "ERROR: Number of URLs and cookies must match."
            exit 1
          fi

          ls -lh "downloads/$FOLDER_NAME/" || true

      - name: Download videos
        env:
          QUALITY: ${{ github.event.inputs.quality }}
          FOLDER_NAME: ${{ github.event.inputs.folder_name }}
        run: |
          set -u
          cd "$GITHUB_WORKSPACE"

          mkdir -p "downloads/$FOLDER_NAME"
          mkdir -p tmp_cookies

          REPORT_FILE="downloads/$FOLDER_NAME/DOWNLOAD_REPORT.txt"
          FAILED_FILE="downloads/$FOLDER_NAME/FAILED_URLS.txt"
          SUCCESS_FILE="downloads/$FOLDER_NAME/SUCCESS_URLS.txt"

          rm -f "$REPORT_FILE" "$FAILED_FILE" "$SUCCESS_FILE"

          {
            echo "YouTube download report"
            echo "======================="
            echo "Folder: downloads/$FOLDER_NAME"
            echo "Started at: $(date -u)"
            echo
          } > "$REPORT_FILE"

          i=0
          success_count=0
          fail_count=0

          while IFS= read -r VIDEO_URL && IFS= read -r COOKIES_B64 <&3
          do
            i=$((i + 1))

            COOKIE_FILE="tmp_cookies/${i}.txt"
            LOG_FILE="downloads/$FOLDER_NAME/item-${i}.log"

            echo "========================================"
            echo "Processing item #$i"
            echo "URL: $VIDEO_URL"
            echo "Log: $LOG_FILE"

            {
              echo "----------------------------------------"
              echo "Item #$i"
              echo "URL: $VIDEO_URL"
              echo "Time: $(date -u)"
            } >> "$REPORT_FILE"

            if [ -z "${VIDEO_URL:-}" ]; then
              echo "ERROR: URL at item #$i is empty."
              echo "FAILED #$i: EMPTY URL" >> "$REPORT_FILE"
              echo "EMPTY_URL_AT_ITEM_$i" >> "$FAILED_FILE"
              fail_count=$((fail_count + 1))
              continue
            fi

            if [ -z "${COOKIES_B64:-}" ]; then
              echo "ERROR: cookies_b64 at item #$i is empty."
              echo "FAILED #$i: Empty cookies_b64" >> "$REPORT_FILE"
              echo "$VIDEO_URL" >> "$FAILED_FILE"
              fail_count=$((fail_count + 1))
              continue
            fi

            rm -f "$COOKIE_FILE"

            if ! printf '%s' "$COOKIES_B64" | base64 -d > "$COOKIE_FILE" 2>"$LOG_FILE"; then
              echo "ERROR: Base64 decode failed for item #$i"
              echo "FAILED #$i: Base64 decode failed" >> "$REPORT_FILE"
              echo "$VIDEO_URL" >> "$FAILED_FILE"
              fail_count=$((fail_count + 1))
              continue
            fi

            if [ ! -s "$COOKIE_FILE" ]; then
              echo "ERROR: Decoded cookie file for item #$i is empty."
              echo "FAILED #$i: Decoded cookie file is empty" >> "$REPORT_FILE"
              echo "$VIDEO_URL" >> "$FAILED_FILE"
              fail_count=$((fail_count + 1))
              continue
            fi

            if ! grep -q "Netscape HTTP Cookie File" "$COOKIE_FILE"; then
              echo "ERROR: Cookie file for item #$i is not a valid Netscape cookies file."
              echo "FAILED #$i: Invalid Netscape cookies file" >> "$REPORT_FILE"
              echo "$VIDEO_URL" >> "$FAILED_FILE"
              fail_count=$((fail_count + 1))
              continue
            fi

            echo "Downloading item #$i with its own cookies..."

            if yt-dlp \
              --cookies "$COOKIE_FILE" \
              --js-runtimes node \
              --remote-components ejs:github \
              --retries 10 \
              --fragment-retries 10 \
              --extractor-retries 10 \
              --no-playlist \
              -f "$QUALITY" \
              --merge-output-format mp4 \
              -o "downloads/$FOLDER_NAME/%(title).200s [%(id)s].%(ext)s" \
              "$VIDEO_URL" >> "$LOG_FILE" 2>&1
            then
              echo "SUCCESS item #$i"
              echo "SUCCESS #$i: $VIDEO_URL" >> "$REPORT_FILE"
              echo "$VIDEO_URL" >> "$SUCCESS_FILE"
              success_count=$((success_count + 1))
            else
              echo "ERROR: Download failed for item #$i"
              echo "URL failed: $VIDEO_URL"
              echo "FAILED #$i: yt-dlp download failed" >> "$REPORT_FILE"
              echo "$VIDEO_URL" >> "$FAILED_FILE"
              fail_count=$((fail_count + 1))
              continue
            fi

          done < urls.txt 3< cookies_b64_list.txt

          {
            echo
            echo "======================="
            echo "Finished at: $(date -u)"
            echo "Total items: $i"
            echo "Successful: $success_count"
            echo "Failed: $fail_count"
            echo
            echo "Failed URLs file: FAILED_URLS.txt"
            echo "Successful URLs file: SUCCESS_URLS.txt"
            echo "Individual logs: item-N.log"
          } >> "$REPORT_FILE"

          echo "========================================"
          echo "Download summary:"
          echo "Total: $i"
          echo "Successful: $success_count"
          echo "Failed: $fail_count"

          echo
          echo "Downloaded files:"
          ls -lh "downloads/$FOLDER_NAME/" || true

          echo
          echo "Report:"
          cat "$REPORT_FILE"

          if [ "$fail_count" -gt 0 ]; then
            echo
            echo "Some URLs failed, but workflow will continue."
            echo "Failed URLs:"
            cat "$FAILED_FILE" || true
          fi

      - name: Split large files if needed
        env:
          SPLIT_MB: ${{ github.event.inputs.split_size_mb }}
          FOLDER_NAME: ${{ github.event.inputs.folder_name }}
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE"

          LIMIT_BYTES=$((SPLIT_MB * 1024 * 1024))

          echo "Split limit: ${SPLIT_MB} MB"
          echo "Limit bytes: ${LIMIT_BYTES}"

          find "downloads/$FOLDER_NAME" -type f \
            ! -name "*.part-*" \
            ! -name "INSTRUCTIONS.txt" \
            ! -name "*.log" \
            ! -name "*.txt" \
            -print | while IFS= read -r FILE
          do
            SIZE_BYTES="$(stat -c%s "$FILE")"

            echo "Checking: $FILE"
            echo "Size: $SIZE_BYTES bytes"

            if [ "$SIZE_BYTES" -gt "$LIMIT_BYTES" ]; then
              echo "Splitting: $FILE"
              split -b "${SPLIT_MB}M" -d -a 3 "$FILE" "${FILE}.part-"
              rm -f "$FILE"
            else
              echo "No split needed."
            fi
          done

          echo "Final folder contents:"
          ls -lh "downloads/$FOLDER_NAME/"

      - name: Write instructions
        env:
          FOLDER_NAME: ${{ github.event.inputs.folder_name }}
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE"

          {
            echo "Downloaded YouTube files are in this folder."
            echo
            echo "Each URL is downloaded separately."
            echo "yt-dlp automatically chooses the output filename from the video title and ID."
            echo
            echo "If a video was split, you will see files like:"
            echo "  video.mp4.part-000"
            echo "  video.mp4.part-001"
            echo "  video.mp4.part-002"
            echo
            echo "To reassemble split files on Linux:"
            echo "  cat *.part-* > output.mp4"
            echo
            echo "Example:"
            echo "  cat *.mp4.part-* > output.mp4"
            echo
            echo "If there is a normal .mp4 file and no .part-* files, just download the .mp4 file directly."
          } > "downloads/$FOLDER_NAME/INSTRUCTIONS.txt"

          ls -lh "downloads/$FOLDER_NAME/INSTRUCTIONS.txt"

      - name: Commit and push downloads folder
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE"

          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          rm -f cookies.txt
          rm -rf tmp_cookies

          git add -A downloads/

          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi

          git commit -m "Add YouTube downloaded videos [skip ci]"

          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
