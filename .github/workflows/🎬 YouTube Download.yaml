name: youtube-download

on:
  workflow_dispatch:
    inputs:
      url:
        description: "YouTube video URL"
        required: true
        type: string

      cookies_b64:
        description: "Optional: Base64 content of cookies.txt"
        required: false
        type: string

      quality:
        description: "yt-dlp format selector"
        required: false
        default: "bv*+ba/b"
        type: string

      split_size_mb:
        description: "Maximum size per file in MB"
        required: false
        default: "90"
        type: string

jobs:
  download:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install tools
        run: |
          set -eu

          sudo apt-get update
          sudo apt-get install -y ffmpeg curl ca-certificates coreutils git

          sudo curl -L \
            https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
            -o /usr/local/bin/yt-dlp

          sudo chmod +x /usr/local/bin/yt-dlp

          echo "yt-dlp:"
          yt-dlp --version

          echo "node:"
          node --version

          echo "ffmpeg:"
          ffmpeg -version | head -n 1

      - name: Prepare workspace
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE"

          mkdir -p downloads
          rm -f cookies.txt
          find downloads -mindepth 1 -maxdepth 1 -type f -delete || true

      - name: Decode cookies if provided
        env:
          COOKIES_B64: ${{ github.event.inputs.cookies_b64 }}
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE"

          if [ -z "${COOKIES_B64:-}" ]; then
            echo "No cookies_b64 provided."
            echo "Workflow will try to download WITHOUT cookies."
            exit 0
          fi

          echo "cookies_b64 provided. Decoding..."

          printf '%s' "$COOKIES_B64" | base64 -d > cookies.txt

          if [ ! -s cookies.txt ]; then
            echo "ERROR: cookies.txt is empty after decoding."
            exit 1
          fi

          echo "cookies.txt created:"
          ls -lh cookies.txt

          echo "cookies.txt first lines:"
          head -n 3 cookies.txt || true

          if ! grep -q "Netscape HTTP Cookie File" cookies.txt; then
            echo "ERROR: cookies.txt does not look like a valid Netscape cookies file."
            exit 1
          fi

      - name: Download video
        env:
          VIDEO_URL: ${{ github.event.inputs.url }}
          QUALITY: ${{ github.event.inputs.quality }}
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE"

          mkdir -p downloads

          COMMON_ARGS="
            --js-runtimes node
            --remote-components ejs:github
            --retries 10
            --fragment-retries 10
            --extractor-retries 10
            --no-playlist
            --merge-output-format mp4
          "

          if [ -f cookies.txt ]; then
            echo "Downloading WITH cookies."

            yt-dlp \
              --cookies cookies.txt \
              --js-runtimes node \
              --remote-components ejs:github \
              --retries 10 \
              --fragment-retries 10 \
              --extractor-retries 10 \
              --no-playlist \
              -f "$QUALITY" \
              --merge-output-format mp4 \
              -o "downloads/%(title).200s [%(id)s].%(ext)s" \
              "$VIDEO_URL"
          else
            echo "Downloading WITHOUT cookies."

            yt-dlp \
              --no-cookies \
              --js-runtimes node \
              --remote-components ejs:github \
              --retries 10 \
              --fragment-retries 10 \
              --extractor-retries 10 \
              --no-playlist \
              -f "$QUALITY" \
              --merge-output-format mp4 \
              -o "downloads/%(title).200s [%(id)s].%(ext)s" \
              "$VIDEO_URL"
          fi

          echo "Downloaded files:"
          ls -lh downloads/

      - name: Split large files if needed
        env:
          SPLIT_MB: ${{ github.event.inputs.split_size_mb }}
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE"

          LIMIT_BYTES=$((SPLIT_MB * 1024 * 1024))

          echo "Split limit: ${SPLIT_MB} MB"

          find downloads -type f ! -name "*.part-*" ! -name "INSTRUCTIONS.txt" -print | while IFS= read -r FILE
          do
            SIZE_BYTES="$(stat -c%s "$FILE")"

            echo "Checking: $FILE"
            echo "Size: $SIZE_BYTES bytes"

            if [ "$SIZE_BYTES" -gt "$LIMIT_BYTES" ]; then
              echo "Splitting: $FILE"
              split -b "${SPLIT_MB}M" -d -a 3 "$FILE" "${FILE}.part-"
              rm -f "$FILE"
            else
              echo "No split needed."
            fi
          done

          ls -lh downloads/

      - name: Write instructions
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE"

          {
            echo "Downloaded YouTube files are in this folder."
            echo
            echo "If the file was split, reassemble with:"
            echo "  cat video.mp4.part-* > video.mp4"
            echo
            echo "Example:"
            echo "  cat *.mp4.part-* > output.mp4"
          } > downloads/INSTRUCTIONS.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-video
          path: downloads/*
