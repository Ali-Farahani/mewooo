name: youtube-download

on:
  workflow_dispatch:
    inputs:
      url:
        description: "YouTube video URL"
        required: true
        type: string

      cookies_b64:
        description: "Base64 content of cookies.txt"
        required: true
        type: string

      quality:
        description: "yt-dlp format selector"
        required: false
        default: "bv*+ba/b"
        type: string

      split_size_mb:
        description: "Maximum size per file in MB"
        required: false
        default: "90"
        type: string

jobs:
  download:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark repo safe
        run: |
          set -eu
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install tools
        run: |
          set -eu

          sudo apt-get update
          sudo apt-get install -y ffmpeg curl ca-certificates coreutils git

          sudo curl -L \
            https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
            -o /usr/local/bin/yt-dlp

          sudo chmod +x /usr/local/bin/yt-dlp

          echo "yt-dlp:"
          yt-dlp --version

          echo "node:"
          node --version

          echo "ffmpeg:"
          ffmpeg -version | head -n 1

      - name: Prepare workspace
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE"

          mkdir -p downloads
          rm -f cookies.txt

          # Clean previous downloaded files from downloads folder
          find downloads -mindepth 1 -maxdepth 1 -type f -delete || true

          ls -lh downloads/ || true

      - name: Decode cookies
        env:
          COOKIES_B64: ${{ github.event.inputs.cookies_b64 }}
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE"

          if [ -z "${COOKIES_B64:-}" ]; then
            echo "ERROR: cookies_b64 is required."
            exit 1
          fi

          echo "Decoding cookies..."

          printf '%s' "$COOKIES_B64" | base64 -d > cookies.txt

          if [ ! -s cookies.txt ]; then
            echo "ERROR: cookies.txt is empty after decoding."
            exit 1
          fi

          if ! grep -q "Netscape HTTP Cookie File" cookies.txt; then
            echo "ERROR: cookies.txt does not look like a valid Netscape cookies file."
            exit 1
          fi

          echo "cookies.txt decoded successfully."
          ls -lh cookies.txt

      - name: Download video
        env:
          VIDEO_URL: ${{ github.event.inputs.url }}
          QUALITY: ${{ github.event.inputs.quality }}
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE"

          mkdir -p downloads

          echo "Downloading WITH cookies..."

          yt-dlp \
            --cookies cookies.txt \
            --js-runtimes node \
            --remote-components ejs:github \
            --retries 10 \
            --fragment-retries 10 \
            --extractor-retries 10 \
            --no-playlist \
            -f "$QUALITY" \
            --merge-output-format mp4 \
            -o "downloads/%(title).200s [%(id)s].%(ext)s" \
            "$VIDEO_URL"

          echo "Downloaded files:"
          ls -lh downloads/

      - name: Split large files if needed
        env:
          SPLIT_MB: ${{ github.event.inputs.split_size_mb }}
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE"

          LIMIT_BYTES=$((SPLIT_MB * 1024 * 1024))

          echo "Split limit: ${SPLIT_MB} MB"
          echo "Limit bytes: ${LIMIT_BYTES}"

          find downloads -type f ! -name "*.part-*" ! -name "INSTRUCTIONS.txt" -print | while IFS= read -r FILE
          do
            SIZE_BYTES="$(stat -c%s "$FILE")"

            echo "Checking: $FILE"
            echo "Size: $SIZE_BYTES bytes"

            if [ "$SIZE_BYTES" -gt "$LIMIT_BYTES" ]; then
              echo "Splitting: $FILE"
              split -b "${SPLIT_MB}M" -d -a 3 "$FILE" "${FILE}.part-"
              rm -f "$FILE"
            else
              echo "No split needed."
            fi
          done

          echo "Final downloads folder:"
          ls -lh downloads/

      - name: Write instructions
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE"

          {
            echo "Downloaded YouTube files are in this folder."
            echo
            echo "If the video was split, you will see files like:"
            echo "  video.mp4.part-000"
            echo "  video.mp4.part-001"
            echo "  video.mp4.part-002"
            echo
            echo "To reassemble split files on Linux:"
            echo "  cat *.part-* > output.mp4"
            echo
            echo "Example:"
            echo "  cat *.mp4.part-* > output.mp4"
            echo
            echo "If there is a normal .mp4 file and no .part-* files, just download the .mp4 file directly."
          } > downloads/INSTRUCTIONS.txt

          ls -lh downloads/INSTRUCTIONS.txt

      - name: Commit and push downloads folder
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE"

          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          # Important: do not commit cookies
          rm -f cookies.txt

          git add -A downloads/

          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi

          git commit -m "Add YouTube downloaded video [skip ci]"

          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
