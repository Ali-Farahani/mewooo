name: 🎬 YouTube Download

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube video URL'
        required: true
        type: string
      cookies_b64:
        description: 'Base64 of cookies.txt (optional)'
        required: false
        type: string
      quality:
        description: 'Quality format'
        required: false
        default: 'bv*+ba/b'
        type: string

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Install yt-dlp and ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip
          python3 -m pip install -U yt-dlp

      - name: Prepare cookies from input
        run: |
          if [ -n "${{ github.event.inputs.cookies_b64 }}" ]; then
            echo "${{ github.event.inputs.cookies_b64 }}" | base64 -d > cookies.txt
            echo "cookies.txt created"
            head -n 1 cookies.txt
            ls -lh cookies.txt
          else
            echo "No cookies input provided"
          fi

      - name: Download video
        run: |
          mkdir -p downloads

          if [ -f cookies.txt ]; then
            yt-dlp \
              --cookies cookies.txt \
              -f "${{ github.event.inputs.quality }}" \
              --merge-output-format mp4 \
              -o "downloads/%(title).200s [%(id)s].%(ext)s" \
              "${{ github.event.inputs.url }}"
          else
            yt-dlp \
              -f "${{ github.event.inputs.quality }}" \
              --merge-output-format mp4 \
              -o "downloads/%(title).200s [%(id)s].%(ext)s" \
              "${{ github.event.inputs.url }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-video
          path: downloads/*
