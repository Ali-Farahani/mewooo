name: 🎬 YouTube Download

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Quality format'
        required: false
        default: 'bv*+ba/b'
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Install yt-dlp and ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip
          python3 -m pip install -U yt-dlp

      - name: Download video
        run: |
          mkdir -p downloads
          yt-dlp \
            -f "${{ github.event.inputs.quality }}" \
            --merge-output-format mp4 \
            -o "downloads/%(title).200s [%(id)s].%(ext)s" \
            "${{ github.event.inputs.url }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-video
          path: downloads/*
