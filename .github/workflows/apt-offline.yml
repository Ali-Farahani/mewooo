name: apt-offline-download

on:
  workflow_dispatch:
    inputs:
      sig_b64:
        description: 'Base64 content of update.sig'
        required: true
        type: string

jobs:
  apt-offline:
    runs-on: ubuntu-latest

    container: debian:trixie

    steps:
      - name: Install tools
        run: |
          apt-get update
          apt-get install -y ca-certificates apt-offline

      - name: Create update.sig
        run: |
          set -eux
          printf '%s' "${{ github.event.inputs.sig_b64 }}" | base64 -d > update.sig
          ls -lh update.sig
          head -n 5 update.sig || true

      - name: Download bundle
        run: |
          set -eux
          mkdir -p downloads
          rm -f downloads/update.zip
          apt-offline get update.sig --bundle downloads/update.zip
          ls -lh downloads
          test -f downloads/update.zip
          test -s downloads/update.zip

      - name: Upload update.zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: apt-offline-update
          path: downloads/update.zip
          if-no-files-found: error
