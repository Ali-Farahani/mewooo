name: apt-offline bundle

on:
  workflow_dispatch:
    inputs:
      sig_base64:
        description: "Base64 content of apt-offline .sig file"
        required: true
        type: string
      output_name:
        description: "Output bundle name"
        required: true
        default: "full-upgrade.zip"
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie

    steps:
      - name: Install tools
        run: |
          set -eux
          apt-get update
          apt-get install -y apt-offline ca-certificates

      - name: Decode sig
        shell: bash
        run: |
          set -eux
          printf '%s' '${{ inputs.sig_base64 }}' | base64 -d > request.sig
          ls -lh
          file request.sig || true
          wc -c request.sig

      - name: Show sig content header
        shell: bash
        run: |
          set -eux
          head -c 300 request.sig || true
          echo

      - name: Download packages
        shell: bash
        run: |
          set -eux
          apt-offline get request.sig --bundle "${{ inputs.output_name }}"
          ls -lah
          test -f "${{ inputs.output_name }}"
          test -s "${{ inputs.output_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apt-offline-bundle
          path: ${{ inputs.output_name }}
          if-no-files-found: error
