name: apt-offline bundle

on:
  workflow_dispatch:
    inputs:
      sig_base64:
        description: 'Base64 content of apt-offline .sig file'
        required: true
        type: string
      output_name:
        description: 'Output bundle name'
        required: true
        default: 'full-upgrade.zip'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie

    steps:
      - name: Install tools
        run: |
          apt-get update
          apt-get install -y apt-offline ca-certificates

      - name: Decode sig
        shell: bash
        run: |
          echo '${{ inputs.sig_base64 }}' | base64 -d > request.sig
          ls -lh request.sig

      - name: Download packages
        run: |
          apt-offline get request.sig --bundle "${{ inputs.output_name }}"
          ls -lh "${{ inputs.output_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apt-offline-bundle
          path: ${{ inputs.output_name }}
