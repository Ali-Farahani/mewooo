name: apt-offline-download

on:
  workflow_dispatch:
    inputs:
      sig_b64:
        description: "Base64 content of apt-offline sig file"
        required: true
        type: string
      split_size_mb:
        description: "Maximum size per file in MB"
        required: false
        default: "90"
        type: string

jobs:
  build-offline-bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container: debian:trixie

    steps:
      - name: Install tools
        run: |
          set -eu
          apt-get update
          apt-get install -y git ca-certificates coreutils apt-offline zip

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark repo safe
        run: |
          set -eu
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Prepare workspace
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE"
          mkdir -p downloads
          rm -f update.sig
          rm -f downloads/update.zip
          rm -f downloads/update.zip.part-*
          rm -f downloads/INSTRUCTIONS.txt

      - name: Decode sig file
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE"
          printf '%s' "${{ github.event.inputs.sig_b64 }}" | base64 -d > update.sig
          test -s update.sig
          ls -lh update.sig

      - name: Build bundle with apt-offline
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE"
          apt-offline get update.sig --bundle downloads/update.zip
          test -f downloads/update.zip
          test -s downloads/update.zip
          ls -lh downloads/update.zip

      - name: Split bundle if larger than limit
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE"

          FILE="downloads/update.zip"
          SPLIT_MB="${{ github.event.inputs.split_size_mb }}"
          SIZE_BYTES="$(stat -c%s "$FILE")"
          LIMIT_BYTES=$((SPLIT_MB * 1024 * 1024))

          echo "Bundle size: $SIZE_BYTES bytes"
          echo "Limit size:  $LIMIT_BYTES bytes"

          if [ "$SIZE_BYTES" -gt "$LIMIT_BYTES" ]; then
            echo "Splitting bundle..."
            split -b "${SPLIT_MB}M" -d -a 3 "$FILE" "${FILE}.part-"
            rm -f "$FILE"
          else
            echo "No split needed."
          fi

          ls -lh downloads/

      - name: Write instructions
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE"

          {
            echo "Downloaded offline bundle files are in this folder."
            echo
            echo "If you see update.zip.part-000, update.zip.part-001, ... then reassemble with:"
            echo "  cat update.zip.part-* > update.zip"
            echo
            echo "Then install on your Debian system with:"
            echo "  sudo apt-offline install update.zip"
            echo "  sudo apt-get --no-download upgrade"
          } > downloads/INSTRUCTIONS.txt

          ls -lh downloads/INSTRUCTIONS.txt

      - name: Commit and push downloads folder
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE"

          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add downloads/

          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi

          git commit -m "Add apt-offline offline bundle [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
