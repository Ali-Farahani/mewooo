name: apt-offline-download

on:
  workflow_dispatch:
    inputs:
      sig_b64:
        description: 'Base64 content of update.sig'
        required: true
        type: string

jobs:
  apt-offline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install apt-offline
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-offline

      - name: Create update.sig
        run: |
          echo "${{ github.event.inputs.sig_b64 }}" | base64 -d > update.sig

      - name: Download bundle
        run: |
          mkdir -p downloads
          apt-offline get update.sig --bundle downloads/update.zip

      - name: Commit bundle
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads/update.zip
          git commit -m "Add apt-offline update bundle" || echo "Nothing to commit"
          git push
