name: apt-offline-download

on:
  workflow_dispatch:
    inputs:
      sig_b64:
        description: 'Base64 content of update.sig'
        required: true
        type: string
      split_size_mb:
        description: 'Split size in MB for large bundle files'
        required: false
        default: 90
        type: number

jobs:
  apt-offline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    container: debian:trixie

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools
        run: |
          apt-get update
          apt-get install -y git ca-certificates apt-offline zip coreutils

      - name: Create update.sig
        run: |
          set -eux
          printf '%s' "${{ github.event.inputs.sig_b64 }}" | base64 -d > update.sig
          ls -lh update.sig

      - name: Build apt-offline bundle
        run: |
          set -eux
          mkdir -p downloads
          rm -f downloads/update.zip
          rm -f downloads/update.zip.part-*
          apt-offline get update.sig --bundle downloads/update.zip
          ls -lh downloads/update.zip
          test -f downloads/update.zip
          test -s downloads/update.zip

      - name: Split large bundle if needed
        run: |
          set -eux
          SPLIT_MB="${{ github.event.inputs.split_size_mb }}"
          SPLIT_BYTES=$(( SPLIT_MB * 1024 * 1024 ))
          FILE="downloads/update.zip"
          SIZE=$(stat -c%s "$FILE")

          echo "Bundle size: $SIZE bytes"
          echo "Split threshold: $SPLIT_BYTES bytes"

          if [ "$SIZE" -gt "$SPLIT_BYTES" ]; then
            echo "File is larger than threshold; splitting..."
            split -b "${SPLIT_MB}M" -d -a 3 "$FILE" "${FILE}.part-"
            rm -f "$FILE"
            ls -lh downloads/
          else
            echo "No split needed."
          fi

      - name: Commit & Push downloads in batches
        run: |
          set -eux
          BRANCH="${GITHUB_REF_NAME}"

          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          mapfile -t ALL_FILES < <(git ls-files --others --modified --exclude-standard downloads/)

          TOTAL=${#ALL_FILES[@]}
          echo "Total files to push: $TOTAL"

          if [ "$TOTAL" -eq 0 ]; then
            echo "Nothing to commit"
            exit 0
          fi

          BATCH_SIZE=5
          BATCH_NUM=0

          for (( i=0; i<TOTAL; i+=BATCH_SIZE )); do
            BATCH_NUM=$(( BATCH_NUM + 1 ))
            BATCH=("${ALL_FILES[@]:i:BATCH_SIZE}")

            echo "Pushing batch $BATCH_NUM"

            git add "${BATCH[@]}"
            git commit -m "Add apt-offline bundle batch $BATCH_NUM [skip ci]" || echo "Nothing to commit"

            git pull --rebase origin "$BRANCH"
            git push origin HEAD:"$BRANCH"
          done
