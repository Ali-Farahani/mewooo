name: apt-offline-download

on:
  workflow_dispatch:
    inputs:
      sig_b64:
        description: 'Base64 content of update.sig'
        required: true
        type: string

jobs:
  apt-offline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    container: debian:trixie

    steps:
      - name: Install tools
        run: |
          apt-get update
          apt-get install -y git ca-certificates apt-offline

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Create update.sig
        run: |
          set -eux
          printf '%s' "${{ github.event.inputs.sig_b64 }}" | base64 -d > update.sig
          ls -lh update.sig
          head -n 5 update.sig || true


      - name: Download bundle
        run: |
          set -eux
          mkdir -p downloads
          rm -f downloads/update.zip
          apt-offline get update.sig --bundle downloads/update.zip
          ls -lh downloads
          test -f downloads/update.zip
          test -s downloads/update.zip


      - name: Commit bundle
        run: |
          set -eux
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add downloads/update.zip
          git commit -m "Add apt-offline update bundle [skip ci]" || echo "Nothing to commit"

          git remote -v
          git push origin HEAD:${GITHUB_REF_NAME}
