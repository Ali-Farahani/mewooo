name: ⬇️ 2-Build apt-offline bundle

on:
  workflow_dispatch:
    inputs:
      sig_base64:
        description: 'Base64 content of apt-offline .sig file'
        required: true
        type: string
      output_name:
        description: 'Output bundle name'
        required: false
        default: 'full-upgrade.zip'
        type: string

jobs:
  build-bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    container:
      image: debian:trixie

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install apt-offline
        run: |
          set -eux
          apt-get update
          apt-get install -y apt-offline ca-certificates file git

      - name: Decode signature
        run: |
          set -eux
          mkdir -p work downloads
          printf '%s' '${{ inputs.sig_base64 }}' | base64 -d > work/request.sig
          ls -lh work/request.sig
          file work/request.sig || true
          wc -c work/request.sig

      - name: Build apt-offline bundle
        run: |
          set -eux
          apt-offline get work/request.sig --bundle "downloads/${{ inputs.output_name }}"
          ls -lah downloads
          test -f "downloads/${{ inputs.output_name }}"
          test -s "downloads/${{ inputs.output_name }}"

      - name: Commit and Push bundle
        run: |
          set -eux

          BRANCH="${GITHUB_REF_NAME}"
          echo "Current branch: $BRANCH"

          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git status
          ls -lah downloads

          git add "downloads/${{ inputs.output_name }}"
          git status

          git commit -m "Add apt-offline bundle: ${{ inputs.output_name }} [skip ci]" || echo "Nothing to commit"

          git pull --rebase origin "$BRANCH"
          git push origin HEAD:"$BRANCH"
