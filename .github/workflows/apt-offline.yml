name: apt-offline-download

on:
  workflow_dispatch:
    inputs:
      sig_b64:
        description: 'Base64 content of update.sig'
        required: true
        type: string

jobs:
  apt-offline:
    runs-on: ubuntu-latest
    container: debian:trixie

    permissions:
      contents: write

    steps:
      - name: Install tools
        run: |
          apt-get update
          apt-get install -y git ca-certificates apt-offline

      - uses: actions/checkout@v4

      - name: Create update.sig
        run: |
          printf '%s' "${{ github.event.inputs.sig_b64 }}" | base64 -d > update.sig
          head -n 5 update.sig

      - name: Download bundle
        run: |
          mkdir -p downloads
          apt-offline get update.sig --bundle downloads/update.zip

      - name: Commit bundle
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads/update.zip
          git commit -m "Add apt-offline update bundle" || echo "Nothing to commit"
          git push
